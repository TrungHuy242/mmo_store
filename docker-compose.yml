services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: huy0610
      POSTGRES_DB: mmostore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mmonet

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_TYPE=postgres
      - DATABASE_URL=postgresql://postgres:huy0610@postgres:5432/mmostore
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    networks:
      - mmonet

  frontend:
    build:
      context: ./frontend
      args:
        # Doi thanh domain backend that khi deploy production, vd: https://api.yourdomain.com/api
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - mmonet

volumes:
  postgres_data:

networks:
  mmonet:
    driver: bridge
